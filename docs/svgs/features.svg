<svg viewBox="0 0 1200 380" width="100%" height="340" xmlns="http://www.w3.org/2000/svg">
    <style>
        text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .box-bg { fill: #e6f4ea; stroke: #a7cdb3; stroke-width: 1; }
        .title { font-weight: 700; font-size: 16px; fill: #1a202c; }
        .content { font-size: 13px; fill: #4a5568; }
    </style>

    <g>
        <rect class="box-bg" x="20" y="20" width="570" height="100" rx="6"/>
        <rect x="20" y="20" width="4" height="100" fill="#1f883d"/>
        <text class="title" x="40" y="50">Bounded Metadata Cache</text>
        <text class="content" x="40" y="78">Reuse reflection metadata with bounded FIFO eviction</text>
        <text class="content" x="40" y="98">Explicit cache lifecycle control for long-running workers</text>
    </g>

    <g>
        <rect class="box-bg" x="610" y="20" width="570" height="100" rx="6"/>
        <rect x="610" y="20" width="4" height="100" fill="#1f883d"/>
        <text class="title" x="630" y="50">Password Generation</text>
        <text class="content" x="630" y="78">Generate secure passwords with guaranteed character diversity</text>
        <text class="content" x="630" y="98">Lowercase, uppercase, digits and special characters included</text>
    </g>

    <g>
        <rect class="box-bg" x="20" y="140" width="570" height="100" rx="6"/>
        <rect x="20" y="140" width="4" height="100" fill="#1f883d"/>
        <text class="title" x="40" y="170">Predictable Output</text>
        <text class="content" x="40" y="198">Deterministic shape and formatting across every helper</text>
        <text class="content" x="40" y="218">Safe for APIs, forms and data pipelines</text>
    </g>

    <g>
        <rect class="box-bg" x="610" y="140" width="570" height="100" rx="6"/>
        <rect x="610" y="140" width="4" height="100" fill="#1f883d"/>
        <text class="title" x="630" y="170">Reflection Metadata</text>
        <text class="content" x="630" y="198">Inspect class short names, properties and attributes</text>
        <text class="content" x="630" y="218">Resolve union, intersection and DNF property type names</text>
    </g>

    <g>
        <rect class="box-bg" x="20" y="260" width="570" height="100" rx="6"/>
        <rect x="20" y="260" width="4" height="100" fill="#1f883d"/>
        <text class="title" x="40" y="290">Time Zone Catalog</text>
        <text class="content" x="40" y="318">Retrieve all PHP time zones with UTC offsets and labels</text>
        <text class="content" x="40" y="338">Deterministic sorting by ascending offset</text>
    </g>

    <g>
        <rect class="box-bg" x="610" y="260" width="570" height="100" rx="6"/>
        <rect x="610" y="260" width="4" height="100" fill="#1f883d"/>
        <text class="title" x="630" y="290">Word Case Conversion</text>
        <text class="content" x="630" y="318">Convert between camelToSnake(), snakeToCamel() and toTitleWords()</text>
        <text class="content" x="630" y="338">Consistent output across casing transformations</text>
    </g>
</svg>
